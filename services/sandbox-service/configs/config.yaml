service:
  id: sandbox-service
  name: sandbox-service
  version: dev

server:
  http:
    addr: 0.0.0.0:8081
    advertise_addr: sandbox-service:8081
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9081
    advertise_addr: sandbox-service:9081
    timeout: 10s

sandbox:
  workspace_root: /tmp/acorn/sandbox/workspaces
  resource_blob_root: /tmp/acorn/sandbox/resources
  local_process:
    enabled: true
    default_timeout_seconds: 30
    max_timeout_seconds: 120
    max_stdout_bytes: 1048576
    max_stderr_bytes: 1048576

observability:
  enabled: true
  environment: dev
  tracing:
    enabled: true
    exporter: stdout
    otlp_endpoint: ""
    sample_ratio: 1.0
  metrics:
    enabled: false
    exporter: noop

log:
  level: info
