service:
  id: sandbox-service
  name: sandbox-service
  version: dev

server:
  http:
    addr: 0.0.0.0:8081
    advertise_addr: sandbox-service:8081
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9081
    advertise_addr: sandbox-service:9081
    timeout: 10s

sandbox:
  workspace_root: /tmp/acorn/sandbox/workspaces

log:
  level: info
