service:
  id: agent-control-plane
  name: agent-control-plane
  version: dev

server:
  http:
    addr: 0.0.0.0:8080
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9080
    timeout: 10s

sandbox:
  service_id: sandbox-service
  grpc_addr: 127.0.0.1:9081
  default_profile_id: local-process-dev

sandbox_policies:
  global:
    default_profile_id: local-process-dev
    allowed_profile_ids:
      - local-process-dev
  tenants:
    enterprise-a:
      default_profile_id: local-process-dev
      allowed_profile_ids:
        - local-process-dev
  users:
    dev-user:
      default_profile_id: local-process-dev
      allowed_profile_ids:
        - local-process-dev

resource:
  blob_root: /tmp/acorn/control-plane/resources
  upload_max_bytes: 104857600

log:
  level: info
