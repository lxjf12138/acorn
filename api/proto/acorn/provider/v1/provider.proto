syntax = "proto3";

package acorn.provider.v1;

import "acorn/common/v1/common.proto";
import "acorn/signal/v1/signal.proto";
import "acorn/tool/v1/tool.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lxjf12138/acorn/packages/api/gen/acorn/provider/v1;providerv1";

message ProviderManifest {
  string id = 1;
  string type = 2;
  string version = 3;
  string display_name = 4;
  string description = 5;
  AgentSurface agent_surface = 10;
  SignalSurface signal_surface = 11;
  ControlSurface control_surface = 12;
  ObservationSurface observation_surface = 13;
  ResourceSurface resource_surface = 14;
  SecurityPolicy security = 15;
  bytes metadata_json = 100;
}

message AgentSurface {
  string protocol = 1;
  repeated acorn.tool.v1.ToolSpec tools = 2;
}

message SignalSurface {
  repeated acorn.signal.v1.SignalSpec emits = 1;
}

message ControlSurface {
  repeated string features = 1;
}

message ObservationSurface {
  repeated string events = 1;
  repeated string metrics = 2;
}

message ResourceSurface {
  repeated string resource_types = 1;
}

message SecurityPolicy {
  repeated string targets = 1;
  string default_target = 2;
  bytes metadata_json = 100;
}

message ProviderHealth {
  string provider_id = 1;
  string status = 2;
  google.protobuf.Timestamp checked_at = 3;
  bytes metadata_json = 100;
}

message ListProvidersRequest {
  acorn.common.v1.PageRequest page = 1;
  acorn.common.v1.Scope scope = 2;
}

message ListProvidersResponse {
  repeated ProviderManifest providers = 1;
  acorn.common.v1.PageResponse page = 2;
}

message GetProviderRequest {
  string provider_id = 1;
  acorn.common.v1.Scope scope = 2;
}

message GetProviderResponse {
  ProviderManifest provider = 1;
}

message GetProviderHealthRequest {
  string provider_id = 1;
  acorn.common.v1.Scope scope = 2;
}

message GetProviderHealthResponse {
  ProviderHealth health = 1;
}

service ProviderService {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);
  rpc GetProviderHealth(GetProviderHealthRequest) returns (GetProviderHealthResponse);
}
