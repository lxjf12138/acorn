syntax = "proto3";

package acorn.event.v1;

import "acorn/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lxjf12138/acorn/packages/api/gen/acorn/event/v1;eventv1";

// Event is for observation, audit, UI, debugging, and monitoring.
// Signal is for external facts that may affect agent runtime.
message Event {
  string id = 1;
  string type = 2;
  google.protobuf.Timestamp time = 3;
  acorn.common.v1.Scope scope = 10;
  string severity = 20;
  bytes data_json = 30;
  bytes metadata_json = 100;
}

message QueryEventsRequest {
  acorn.common.v1.Scope scope = 1;
  repeated string types = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  acorn.common.v1.PageRequest page = 5;
}

message QueryEventsResponse {
  repeated Event events = 1;
  acorn.common.v1.PageResponse page = 2;
}

service EventService {
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);
}
