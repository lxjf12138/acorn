syntax = "proto3";

package acorn.node.v1;

import "acorn/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lxjf12138/acorn/packages/api/gen/acorn/node/v1;nodev1";

message Node {
  string id = 1;
  string name = 2;
  string profile = 3;
  string status = 4;
  string version = 5;
  repeated string labels = 10;
  google.protobuf.Timestamp registered_at = 20;
  google.protobuf.Timestamp last_seen_at = 21;
  bytes metadata_json = 100;
}

message ListNodesRequest {
  acorn.common.v1.PageRequest page = 1;
  acorn.common.v1.Scope scope = 2;
}

message ListNodesResponse {
  repeated Node nodes = 1;
  acorn.common.v1.PageResponse page = 2;
}

message GetNodeRequest {
  string node_id = 1;
  acorn.common.v1.Scope scope = 2;
}

message GetNodeResponse {
  Node node = 1;
}

service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
}
