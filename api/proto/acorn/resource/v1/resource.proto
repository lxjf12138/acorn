syntax = "proto3";

package acorn.resource.v1;

import "acorn/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lxjf12138/acorn/packages/api/gen/acorn/resource/v1;resourcev1";

message ResourceRef {
  string id = 1;
  string uri = 2;
  string name = 3;
  string type = 4;
  string mime_type = 5;
  int64 size = 6;
  string authority = 10;
  string node_id = 11;
  string provider_id = 12;
  string owner_type = 20;
  string owner_id = 21;
  string version = 30;
  string content_hash = 31;
  bytes metadata_json = 100;
}

message Artifact {
  string id = 1;
  ResourceRef resource = 2;
  string producer_type = 10;
  string producer_id = 11;
  google.protobuf.Timestamp created_at = 20;
  bytes metadata_json = 100;
}

message ListResourcesRequest {
  acorn.common.v1.Scope scope = 1;
  string owner_type = 2;
  string owner_id = 3;
  string type = 4;
  acorn.common.v1.PageRequest page = 10;
}

message ListResourcesResponse {
  repeated ResourceRef resources = 1;
  acorn.common.v1.PageResponse page = 2;
}

service ResourceService {
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
}
