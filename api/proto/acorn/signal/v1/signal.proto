syntax = "proto3";

package acorn.signal.v1;

import "acorn/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lxjf12138/acorn/packages/api/gen/acorn/signal/v1;signalv1";

message Signal {
  string id = 1;
  string type = 2;
  string source_service_id = 3;
  string provider_id = 4;
  string subject = 5;
  google.protobuf.Timestamp occurred_at = 6;
  acorn.common.v1.Scope scope = 10;
  string text = 20;
  repeated string resource_ids = 21;
  string severity = 30;
  string dedupe_key = 31;
  bytes metadata_json = 100;
}

message SignalSpec {
  string type = 1;
  string description = 2;
  bytes metadata_json = 100;
}

message EmitSignalRequest {
  Signal signal = 1;
}

message EmitSignalResponse {
  string signal_id = 1;
}

service SignalIngestService {
  rpc EmitSignal(EmitSignalRequest) returns (EmitSignalResponse);
}
